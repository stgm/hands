# SQLite for development/test. Versions 3.8.0 and up are supported.
default: &default
  timeout: 5000

development:
  adapter: sqlite3
  <<: *default
  database: storage/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  adapter: sqlite3
  <<: *default
  database: storage/test.sqlite3

# Postgres in production, provided via k8s env vars. All Solid Cache/Queue/Cable
# tables live in the same database as the primary — no separate DBs needed.
production:
  primary: &primary_production
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    database: <%= ENV['DATABASE_NAME'].presence || "storage/production.sqlite3" %>
    username: <%= ENV['DATABASE_USER'].presence || "default_user" %>
    password: <%= ENV['DATABASE_PASSWORD'].presence || "default_password" %>
    sslmode: require
  cache:
    <<: *primary_production
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    migrations_paths: db/cable_migrate
